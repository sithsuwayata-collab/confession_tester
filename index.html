<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Confession Wall</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Noto+Sans+Sinhala:wght@400;700&family=Quicksand:wght@500&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #0f172a;
            --accent: #00f2ff;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --text: #f8fafc;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; 
            background-color: var(--bg-color);
            color: var(--text);
            font-family: 'Inter', 'Noto Sans Sinhala', sans-serif;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden; 
            transition: background 0.8s ease;
        }

        .orb {
            position: fixed;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            opacity: 0.12;
            transition: all 0.8s ease;
        }

        .app-shell {
            width: 100%;
            max-width: 440px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            z-index: 10;
            position: relative;
        }

        /* --- UPDATED HEADER FOR NEW LOGO --- */
        header { 
            text-align: center; 
            margin: 20px 0 30px; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
        }
        
        .app-logo-new { 
            width: 140px; /* Bigger size for the integrated logo */
            height: auto; 
            margin-bottom: 20px; 
            filter: drop-shadow(0 0 12px rgba(0, 242, 255, 0.4));
        }
        
        /* Font styles matching the new logo and subtitle */
        header h1 { 
            font-family: 'Inter', sans-serif;
            font-weight: 700; 
            letter-spacing: 0.5px; 
            margin: 0; 
            font-size: 2.1rem; /* Slightly larger, bold font */
            color: var(--accent); /* Teal color */
        }
        
        header p { 
            font-family: 'Inter', sans-serif;
            opacity: 0.5; /* Lighter grey subtitle */
            font-size: 0.9rem; /* Smaller subtitle font */
            margin-top: 8px; 
            letter-spacing: 0.5px;
        }
        /* ---------------------------------- */

        .card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            margin-bottom: 20px;
        }

        .label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1.5px; opacity: 0.5; margin-bottom: 12px; display: block; }

        .emotion-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .emotion-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            padding: 10px 2px;
            border-radius: 15px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            transition: all 0.2s ease;
        }

        .emotion-item.active { background: rgba(255,255,255,0.1); border-color: var(--accent); box-shadow: 0 0 15px var(--accent); }

        textarea {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 15px;
            color: white;
            font-family: inherit;
            resize: none;
            outline: none;
            margin-bottom: 15px;
        }

        .btn-send {
            width: 100%;
            padding: 16px;
            border-radius: 18px;
            border: none;
            background: var(--accent);
            color: #000;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            margin-bottom: 12px;
        }

        .btn-send:disabled { background: #1e293b; color: #475569; cursor: not-allowed; }

        /* The common branding footer from other screens */
        .footer-branding {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: auto;
            padding-bottom: 25px;
            opacity: 0.8;
            z-index: 20;
        }

        .footer-logo { width: 38px; height: auto; }

        .footer-text {
            font-family: 'Quicksand', sans-serif;
            font-size: 0.85rem;
            color: var(--text);
            font-weight: 500;
        }

        .screen { display: none; flex-direction: column; width: 100%; height: 100%; }
        .screen.active { display: flex; }
    </style>
</head>
<body>

    <div class="orb" id="orb-1" style="top: -10%; left: -10%; background: var(--accent);"></div>
    <div class="orb" id="orb-2" style="bottom: -10%; right: -10%; background: #a855f7;"></div>

    <div class="app-shell">
        
        <header>
            <img src="logo.png" alt="Logo" class="app-logo-new" onerror="this.style.display='none'">
            <h1>Confession Wall</h1>
            <p>Speak your truth anonymously</p>
        </header>
        <div id="main-card" class="card">
            <span class="label">Choose your mood</span>
            <div class="emotion-grid">
                <div class="emotion-item" onclick="setMood('Happy', '#f59e0b', '#2d1a01')"><span>😊</span><span>Happy</span></div>
                <div class="emotion-item" onclick="setMood('Sad', '#3b82f6', '#020617')"><span>😢</span><span>Sad</span></div>
                <div class="emotion-item" onclick="setMood('Angry', '#ef4444', '#1a0505')"><span>😠</span><span>Angry</span></div>
                <div class="emotion-item" onclick="setMood('Calm', '#10b981', '#051a10')"><span>😌</span><span>Calm</span></div>
                <div class="emotion-item" onclick="setMood('Excited', '#ec4899', '#2d061a')"><span>🤩</span><span>Excited</span></div>
                <div class="emotion-item" onclick="setMood('Loved', '#f43f5e', '#31040d')"><span>🥰</span><span>Loved</span></div>
                <div class="emotion-item" onclick="setMood('Lonely', '#64748b', '#0f172a')"><span>😶</span><span>Lonely</span></div>
                <div class="emotion-item" onclick="setMood('Confused', '#a855f7', '#1a0b2e')"><span>🤔</span><span>Confused</span></div>
            </div>

            <span class="label">Your message</span>
            <textarea id="confession" rows="5" placeholder="Write something..."></textarea>

            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <span style="font-size: 0.8rem; opacity: 0.7;">Allow comments?</span>
                <div style="display: flex; gap: 5px; background: rgba(0,0,0,0.2); padding: 4px; border-radius: 10px;">
                    <button id="opt-no" class="btn-send active" style="width:auto; padding:6px 12px; font-size:0.75rem; margin:0;" onclick="setComments('No')">No</button>
                    <button id="opt-yes" class="btn-send btn-outline-small" style="width:auto; padding:6px 12px; font-size:0.75rem; margin:0;" onclick="setComments('Yes')">Yes</button>
                </div>
            </div>

            <button id="send-btn" class="btn-send" disabled onclick="handleSend()">Post Confession</button>
        </div>

        <div class="footer-branding" style="display:none;">
            <a href="https://www.facebook.com/groups/sithsuwaarana" target="_blank" class="footer-logo-link">
                <img src="logo.png" alt="Logo" class="footer-logo" onerror="this.style.display='none'">
            </a>
            <span class="footer-text">Community Support Project</span>
        </div>

    </div>

    <div id="screen-success" class="screen">
        <div class="card" style="text-align: center; margin-top: 100px;">
            <div style="font-size: 4rem; margin-bottom: 20px;">🕊️</div>
            <h2 style="color:var(--accent);">Sent</h2>
            <p style="opacity: 0.8;">Your confession will appear within 24 hours.</p>
            <button class="btn-send" style="margin-top: 25px;" onclick="location.reload()">Back</button>
        </div>
    </div>

    <script>
        // Rest of your JS logic here...
    </script>
</body>
</html>
